<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketweaver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
      user-select: none;
    }
    #overlay {
      display: block;
      position: absolute;
      top: 0; left: 0;
      cursor: default;
    }
    /* Drag is handled in JS via win.startMoving() — no CSS drag region needed */
  </style>
</head>
<body>
  <canvas id="overlay"></canvas>
  <script type="module" src="./main.ts"></script>
</body>
</html>
